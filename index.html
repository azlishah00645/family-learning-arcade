<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Family Learning Arcade</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <!-- Hub screens render here -->
  <div id="app"></div>

  <!-- Games render here (Phaser canvas + touch controls) -->
  <div id="game-root" class="hidden">
    <div id="game-container"></div>
  </div>

  <!-- Popups, question gates, family report, certificates -->
  <div id="overlay-root"></div>

  <!-- Phaser 3 engine -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Question / content banks (safe to edit — see file headers) -->
  <script src="content/y1-maths-questions.js"></script>

  <!-- Core -->
  <script src="src/profiles.js"></script>
  <script src="src/shared/sound.js"></script>
  <script src="src/shared/stars.js"></script>
  <script src="src/shared/touchControls.js"></script>
  <script src="src/shared/questionPopup.js"></script>
  <script src="src/shared/siblingCompare.js"></script>

  <!-- Hub + game registry (games register themselves below) -->
  <script src="src/hub.js"></script>

  <!-- Games -->
  <script src="src/games/maths-jungle/levels.js"></script>
  <script src="src/games/maths-jungle/game.js"></script>
</body>
</html>
